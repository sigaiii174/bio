<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>sigaiii bio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:
    radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.9), transparent 40%),
    radial-gradient(circle at 20% 20%, #dbeafe, transparent 45%),
    radial-gradient(circle at 80% 70%, #e0e7ff, transparent 50%),
    linear-gradient(180deg, #f8fafc, #eef2ff);
}

.blob{
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.35;
  animation:float 12s ease-in-out infinite;
}

.blob.one{background:#93c5fd; top:-150px; left:-150px;}
.blob.two{background:#c4b5fd; bottom:-150px; right:-120px; animation-delay:2s;}

@keyframes float{
  0%,100%{transform:translate(0,0) scale(1);}
  50%{transform:translate(30px,20px) scale(1.08);}
}

.card{
  width:390px;
  padding:26px;
  border-radius:30px;
  position:relative;
  background:rgba(255,255,255,0.45);
  backdrop-filter: blur(35px) saturate(180%);
  -webkit-backdrop-filter: blur(35px) saturate(180%);
  border:1px solid rgba(255,255,255,0.6);
  box-shadow:0 30px 80px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.8);
  text-align:center;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  inset:-60%;
  background:linear-gradient(120deg,transparent 40%,rgba(255,255,255,0.5) 50%,transparent 60%);
  transform:rotate(25deg);
  animation:shine 6s linear infinite;
}

@keyframes shine{
  0%{transform:translateX(-60%) rotate(25deg);}
  100%{transform:translateX(60%) rotate(25deg);}
}

.avatar{
  width:92px;
  height:92px;
  margin:0 auto 14px;
  border-radius:50%;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

h1{
  font-size:20px;
  font-weight:600;
}

p{
  font-size:13px;
  color:#475569;
  margin-bottom:10px;
}

.bio{
  padding:14px;
  border-radius:18px;
  background:rgba(255,255,255,0.5);
  border:1px solid rgba(255,255,255,0.7);
  backdrop-filter: blur(25px);
  color:#1f2937;
  font-size:13px;
  line-height:1.4;
  margin-bottom:14px;
}

.moreBtn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-weight:600;
  color:white;
  background:linear-gradient(135deg,#60a5fa,#a78bfa);
  transition:0.2s;
  margin-bottom:12px;
}

.moreBtn:hover{transform:translateY(-2px);}

.social{
  display:flex;
  justify-content:center;
  gap:14px;
  margin-top:10px;
}

.social a{
  width:44px;
  height:44px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:14px;
  background:rgba(255,255,255,0.6);
  border:1px solid rgba(255,255,255,0.7);
  backdrop-filter:blur(20px);
  text-decoration:none;
  color:#1d4ed8;
  transition:0.2s;
}

.social a:hover{transform:scale(1.1);background:rgba(255,255,255,0.9);}

small{display:block;margin-top:12px;font-size:11px;color:#64748b;}

/* MUSIC CONTROL HIDDEN */
audio{
  position:absolute;
  bottom:0;
  left:0;
  opacity:0;
  pointer-events:none;
}
</style>
</head>
<body>

<div class="blob one"></div>
<div class="blob two"></div>

<div class="card">

  <div class="avatar">
    <img src="p.png" />
  </div>

  <h1>sigaiii</h1>
  <p>Minecraft mod developer</p>

  <button class="moreBtn" onclick="moreInfo()">More info</button>

  <div class="bio">
    Minecraft 1.21.4 mod developer with strong experience in gameplay systems, PvE combat mechanics, and Java-based modding.
  </div>

  <div class="social">
    <a href="https://discord.com/users/sigaiii174" target="_blank"><i class="fa-brands fa-discord"></i></a>
    <a href="https://github.com/sigaiii174" target="_blank"><i class="fa-brands fa-github"></i></a>
    <a href="https://tiktok.com/@sigaiii174" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
  </div>

  <small></small>

</div>

<audio id="bgmusic" src="music.mp3" loop></audio>

<script>
window.addEventListener('mousemove',(e)=>{
  let x=(e.clientX/window.innerWidth)*100;
  let y=(e.clientY/window.innerHeight)*100;
  document.body.style.setProperty('--mx',x+'%');
  document.body.style.setProperty('--my',y+'%');
});

function moreInfo(){
  window.location.href="https://discord.com/users/sigaiii174";
}

// autoplay attempt (browser may require interaction)
window.addEventListener('click',()=>{
  const audio=document.getElementById('bgmusic');
  audio.volume=0.15;
  audio.play();
});
</script>

</body>
</html>
